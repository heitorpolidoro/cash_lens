services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cash_lens
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    command: /bin/sh -c "mix deps.get && mix phx.server"
    ports:
      - "4000:4000"
    env_file:
      - dev.env
    volumes:
      - .:/app
      - /app/_build
      - /app/deps
      - gemini_data:/root/.gemini
    depends_on:
      - db

volumes:
  postgres_data:
  gemini_data:
