version = 1

exclude_patterns = [
    "_build/**",
    "deps/**",
    "priv/static/**",
    "cover/**"
]

test_patterns = [
    "test/**/*_test.exs"
]

[[analyzers]]
name = "javascript"
enabled = true

  [analyzers.meta]
  environment = ["browser", "nodejs"]

[[analyzers]]
name = "test-coverage"
enabled = true

[[analyzers]]
name = "secrets"
enabled = true
